<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrettyBoy — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="logo">PRETTY<span>BOY</span></div>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="sunIcon">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="moonIcon" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <a href="dashboard.html" class="icon-btn" aria-label="Back to dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
      </div>
    </div>

    <h2 class="mb-16">Workout History</h2>

    <div id="historyContent">
      <div class="skeleton" style="height:200px;margin-bottom:16px"></div>
      <div class="skeleton" style="height:200px"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from './js/supabase-client.js'
    import { requireAuth, showToast } from './js/shared.js'

    const session = await requireAuth()
    if (!session) throw new Error('Not authenticated')

    const userId = session.user.id

    // Fetch all logs, ordered by date desc
    const { data: logs, error } = await supabase
      .from('exercise_logs')
      .select('*')
      .eq('user_id', userId)
      .order('log_date', { ascending: false })
      .order('exercise_order', { ascending: true })

    const container = document.getElementById('historyContent')

    if (error || !logs || logs.length === 0) {
      container.innerHTML = `
        <div class="history-empty">
          <h2 style="color:var(--grey-300);font-size:1.5rem;margin-bottom:8px">NO HISTORY YET</h2>
          <p>Complete exercises on your dashboard to see them here.</p>
        </div>`
    } else {
      // Group by date
      const grouped = {}
      logs.forEach(log => {
        if (!grouped[log.log_date]) grouped[log.log_date] = []
        grouped[log.log_date].push(log)
      })

      let html = ''
      const checkSvg = `<svg class="history-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
      const xSvg = `<svg class="history-check" style="color:var(--grey-300)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`

      Object.entries(grouped).forEach(([date, exercises]) => {
        const d = new Date(date + 'T12:00:00')
        const dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
        const completedCount = exercises.filter(e => e.completed).length

        html += `
          <div class="history-date-group">
            <div class="history-date-header">${dateLabel} — ${completedCount}/${exercises.length} completed</div>
            <div class="card">`

        exercises.forEach(ex => {
          let weightDisplay = ''
          if (ex.weight) {
            try {
              const arr = JSON.parse(ex.weight)
              if (Array.isArray(arr)) {
                const filled = arr.filter(w => w)
                if (filled.length > 0) weightDisplay = filled.join(' / ')
              }
            } catch { weightDisplay = ex.weight }
          }
          html += `
              <div class="history-exercise">
                ${ex.completed ? checkSvg : xSvg}
                <span class="history-exercise-name${ex.completed ? '' : '" style="color:var(--grey-400)'}">${ex.exercise_name}</span>
                ${weightDisplay ? `<span class="history-exercise-weight">${weightDisplay}</span>` : ''}
              </div>`
        })

        html += `
            </div>
          </div>`
      })

      container.innerHTML = html
    }

    // Theme toggle
    const saved = localStorage.getItem('pb-theme') || 'light'
    document.documentElement.setAttribute('data-theme', saved)
    document.getElementById('sunIcon').style.display = saved === 'light' ? 'block' : 'none'
    document.getElementById('moonIcon').style.display = saved === 'dark' ? 'block' : 'none'

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'light'
      const next = current === 'light' ? 'dark' : 'light'
      document.documentElement.setAttribute('data-theme', next)
      localStorage.setItem('pb-theme', next)
      document.getElementById('sunIcon').style.display = next === 'light' ? 'block' : 'none'
      document.getElementById('moonIcon').style.display = next === 'dark' ? 'block' : 'none'
    })
  </script>
</body>
</html>
